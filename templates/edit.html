<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Edit Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">

<h2>Edit Patient</h2>

</div>

<div class="card-body">

<form
method="POST"
action="/update/{{ patient.id }}">

<input
class="form-control mb-3"
name="full_name"
value="{{ patient.full_name }}">

<input
type="date"
class="form-control mb-3"
name="dob"
value="{{ patient.dob }}">

<input
class="form-control mb-3"
name="email"
value="{{ patient.email }}">

<input
class="form-control mb-3"
name="glucose"
value="{{ patient.glucose }}">

<input
class="form-control mb-3"
name="haemoglobin"
value="{{ patient.haemoglobin }}">

<input
class="form-control mb-3"
name="cholesterol"
value="{{ patient.cholesterol }}">

<button
class="btn btn-success">

Update Patient

</button>

<a
href="/"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</body>

</html>
